              { date: "2023.08", title: "开始理解工作流", point: "Prompt 只是开始，Workflow 才是真正的创作。", desc: "随着项目越来越复杂，我开始学习 ControlNet、图生图以及节点式生成流程。我逐渐意识到：真正提高质量的不是更长的 Prompt，而是更合理的工作流。", keywords: ["ControlNet", "SDXL", "Workflow", "Consistency"], img: "journey-2023-08.jpg", imgLabel: "早期 Workflow / ComfyUI 节点截图" },

              { date: "2025.05", title: "开始用 AI 讲故事", point: "AI 不只是生成画面，它也可以讲述情感。", desc: "这一阶段，我开始尝试 AI 微电影、公益广告以及电影化叙事。我不断探索角色一致性、镜头语言、节奏控制以及情绪表达。也是从这里开始，我真正从“做图片”转向“做内容”。", keywords: ["AI Film", "Storytelling", "Camera", "Emotion"], img: "journey-2025-05.jpg", imgLabel: "AI 微电影帧" },

而是持续不断的创意迭代。`},footerText:"Understand · Imagine · Create · Refine"},aiJourney:{eyebrow:"AI CREATIVE LAB",sub:"记录我与 AI 一起成长的过程。",focus:{label:"Current Focus",body:"目前，我持续探索 AI 产品、Agent、多模态模型以及智能创意工作流。我的目标不是简单地使用 AI，而是不断探索人与 AI 更高效、更自然的创作方式。"},entries:[{date:"2023.03",title:"初识生成式 AI",point:"第一次意识到，AI 正在改变创意行业。",desc:"当 Midjourney 与 Stable Diffusion 开始进入设计领域时，我第一次接触生成式 AI。最初关注 Prompt、构图、光影以及不同模型之间的风格差异。这段经历让我第一次开始思考：创意是否能够通过 AI 被重新表达。",keywords:["Midjourney","Stable Diffusion","Prompt","视觉探索"],img:"journey-2023-03.jpg",imgLabel:"早期 AI 作品"},{date:"2023.08",title:"开始理解工作流",point:"Prompt 只是开始，Workflow 才是真正的创作。",desc:"随着项目越来越复杂，我开始学习 ControlNet、图生图以及节点式生成流程。我逐渐意识到：真正提高质量的不是更长的 Prompt，而是更合理的工作流。",keywords:["ControlNet","SDXL","Workflow","Consistency"],img:"journey-2023-08.jpg",imgLabel:"早期 Workflow / ComfyUI 节点截图"},{date:"2024.02",title:"进入 ComfyUI 世界",point:"开始搭建，而不是使用。",desc:"我开始使用 ComfyUI 搭建自己的 AI 工作流。从一个工具使用者，逐渐转变成工作流设计者。我开始思考：如何让 AI 创作变得更加稳定、更高效、更可复用。",keywords:["ComfyUI","Workflow","Automation","Nodes"],img:"journey-2024-02.jpg",imgLabel:"ComfyUI 工作流截图"},{date:"2025.05",title:"开始用 AI 讲故事",point:"AI 不只是生成画面，它也可以讲述情感。",desc:"这一阶段，我开始尝试 AI 微电影、公益广告以及电影化叙事。我不断探索角色一致性、镜头语言、节奏控制以及情绪表达。也是从这里开始，我真正从“做图片”转向“做内容”。",keywords:["AI Film","Storytelling","Camera","Emotion"],img:"journey-2025-05.jpg",imgLabel:"AI 微电影帧"},{date:"2025.09",title:"加入 AI 公司",point:"第一次真正参与 AI 产品的设计。",desc:"加入 AI 公司后，我开始参与 AI 数字人产品以及 AI 创意平台的设计。关注点也逐渐从视觉设计转向产品思维、用户体验以及 AI 工作流设计。我开始意识到：未来真正重要的不是作品，而是创作系统。",keywords:["AI Product","Digital Human","UX","Creative System"],img:"journey-2025-09.jpg",imgLabel:"AI 产品 / 数字人界面"},{date:"2026.01",title:"Agent 时代到来",point:"AI 开始拥有思考与协作能力。",desc:"随着 AI Agent 与 MCP 的发展，我开始探索多 Agent 协同创作。相比直接生成内容，我更关注 AI 如何帮助完成创意规划、任务拆解以及自动化执行。",keywords:["AI Agent","MCP","Planning","Automation"],img:"journey-2026-01.jpg",imgLabel:"Agent 工作流图"},{date:"2026.03",title:"人与 AI 共创",point:"未来设计师，将设计人与 AI 的协作方式。",desc:"如今，我更关注如何构建 AI Native Creative Workflow。我相信未来设计师设计的不只是视觉，而是人与 AI 共同创作的新方式。",ke
